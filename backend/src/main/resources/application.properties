spring.datasource.url=jdbc:h2:mem:agriappdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Server port (supports Vercel/Render-style env var `PORT`)
server.port=${PORT:8080}
server.error.include-message=never
spring.main.banner-mode=off

# Logging (production-friendly)
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.agrichain=INFO

# Swagger UI available at exactly:
# http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# JWT settings (HS256)
jwt.secret=AgriChain_JWT_Secret_Key_ChangeThisToAStrongOne_1234567890
jwt.expirationMs=3600000

# CORS (allow all origins for now)
cors.allowedOriginPattern=*
server.port=${PORT:8080}
spring.jpa.open-in-view=false